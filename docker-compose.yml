services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drivex
      POSTGRES_PASSWORD: drivex
      POSTGRES_DB: drivex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivex -d drivex"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DJANGO_SETTINGS_MODULE: task.settings.production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgres://drivex:drivex@db:5432/drivex
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      SECURE_SSL_REDIRECT: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
