{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Mechanics</h2>
    <a href="{% url 'mechanic_create' %}" class="btn btn-primary">Add Mechanic</a>
</div>

<table class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for mechanic in mechanics %}
        <tr>
            <td>{{ mechanic.name }}</td>
            <td>{{ mechanic.specialization }}</td>
            <td class="mechanic-status-cell">
                <form
                    method="post"
                    action="{% url 'mechanic_set_availability' mechanic.id %}"
                    class="mechanic-status-form"
                >
                    {% csrf_token %}
                    <label class="visually-hidden" for="avail-{{ mechanic.id }}">
                        Status for {{ mechanic.name }}
                    </label>
                    <select
                        name="availability"
                        id="avail-{{ mechanic.id }}"
                        class="form-select form-select-sm mechanic-status-select {% if mechanic.is_on_leave %}mechanic-status-select--on-leave{% elif mechanic.has_active_task or mechanic.is_manually_busy %}mechanic-status-select--busy{% else %}mechanic-status-select--free{% endif %}"
                        onchange="this.form.submit()"
                    >
                        <option
                            value="free"
                            {% if not mechanic.is_on_leave and not mechanic.has_active_task and not mechanic.is_manually_busy %}selected{% endif %}
                            {% if mechanic.has_active_task %}disabled title="Complete or reassign open tasks first"{% endif %}
                        >
                            Free
                        </option>
                        <option
                            value="busy"
                            {% if not mechanic.is_on_leave and mechanic.has_active_task or mechanic.is_manually_busy %}selected{% endif %}
                        >
                            Busy
                        </option>
                        <option
                            value="on_leave"
                            {% if mechanic.is_on_leave %}selected{% endif %}
                        >
                            On Leave
                        </option>
                    </select>
                </form>
            </td>
            <td>
                <a href="{% url 'mechanic_update' mechanic.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'mechanic_delete' mechanic.id %}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
