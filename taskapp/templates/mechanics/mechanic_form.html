{% extends 'base.html' %}

{% block content %}

<div class="row">
  <div class="col-12 col-lg-8 col-xl-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Mechanic Form</h2>

        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}

          <button type="submit" class="btn btn-success">Save</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
