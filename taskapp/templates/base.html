{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var KEY = "taskapp-admin-theme";
        var DARK =
          "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/cyborg/bootstrap.min.css";
        var LIGHT =
          "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css";
        var t;
        try {
          t = localStorage.getItem(KEY);
        } catch (e) {
          t = null;
        }
        if (t !== "light" && t !== "dark") {
          try {
            var legacy = localStorage.getItem("drivex-theme");
            if (legacy === "light" || legacy === "dark") {
              t = legacy;
            } else {
              t = "dark";
            }
          } catch (e2) {
            t = "dark";
          }
        }
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.id = "task-site-bootstrap-theme";
        link.href = t === "light" ? LIGHT : DARK;
        document.head.appendChild(link);
        document.documentElement.dataset.dashboardTheme = t;
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07111f" />
    <meta name="application-name" content="Drivex" />
    <title>Drivex</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="{% static 'taskapp/img/favicon.svg' %}"
    />
    <link rel="icon" type="image/x-icon" href="{% static 'taskapp/img/favicon.ico' %}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'taskapp/img/favicon-32x32.png' %}"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{% static 'taskapp/img/apple-touch-icon.png' %}"
    />
    <link rel="manifest" href="{% static 'taskapp/site.webmanifest' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'taskapp/css/site-theme.css' %}" />
  </head>
  <body class="bg-body text-body">
    <script>
      (function () {
        var t = document.documentElement.dataset.dashboardTheme || "dark";
        document.body.dataset.dashboardTheme = t;
      })();
    </script>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 site-navbar"
    >
      <div
        class="container d-flex flex-wrap align-items-center justify-content-between gap-2"
      >
        <a class="navbar-brand" href="{% url 'home' %}">Drivex</a>

        <div class="d-flex flex-wrap align-items-center gap-2 ms-lg-auto">
          <div class="site-nav-links">
          <a
            href="{% url 'customer_eta' %}"
            class="btn {% if request.path == '/track-car/' %}btn-primary{% else %}btn-outline-light{% endif %} me-2"
            >Track Car</a
          >
          <a
            href="{% url 'car_list' %}"
            class="btn {% if request.path|slice:':6' == '/cars/' %}btn-primary{% else %}btn-outline-light{% endif %} me-2"
            >Cars</a
          >
          <a
            href="{% url 'mechanic_list' %}"
            class="btn {% if request.path|slice:':12' == '/mechanics/' %}btn-primary{% else %}btn-outline-light{% endif %} me-2"
            >Mechanics</a
          >
          <a
            href="{% url 'task_list' %}"
            class="btn {% if request.path|slice:':7' == '/tasks/' %}btn-primary{% else %}btn-outline-light{% endif %}"
            >Tasks</a
          >
        </div>
        <div class="theme-toggle-group" id="task-site-theme-toggle">
          <span class="theme-toggle-label">Theme</span>
          <label class="theme-switch" title="Toggle light theme">
            <input
              id="task-site-theme-checkbox"
              type="checkbox"
              aria-label="Toggle site theme"
            />
            <span class="theme-switch-track">
              <span class="theme-switch-thumb">
                <i class="fas fa-moon theme-switch-icon-dark"></i>
                <i class="fas fa-sun theme-switch-icon-light"></i>
              </span>
            </span>
          </label>
          <span id="task-site-theme-label" class="theme-toggle-mode">Dark</span>
        </div>
        </div>
      </div>
    </nav>

    {% if messages %}
    <div class="container mb-3">
      {% for message in messages %}
      <div
        class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'debug' %}secondary{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="container">{% block content %} {% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'taskapp/js/enum-select-theme.js' %}"></script>
    <script>
      (function () {
        var KEY = "taskapp-admin-theme";
        var DARK =
          "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/cyborg/bootstrap.min.css";
        var LIGHT =
          "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css";

        function getTheme() {
          var t = document.body.dataset.dashboardTheme;
          if (t === "light" || t === "dark") return t;
          return "dark";
        }

        function applyTheme(theme) {
          var isLight = theme === "light";
          var link = document.getElementById("task-site-bootstrap-theme");
          if (link) {
            link.href = isLight ? LIGHT : DARK;
          }
          document.body.dataset.dashboardTheme = isLight ? "light" : "dark";
          document.documentElement.dataset.dashboardTheme = isLight
            ? "light"
            : "dark";
          try {
            localStorage.setItem(KEY, isLight ? "light" : "dark");
          } catch (e) {}

          var cb = document.getElementById("task-site-theme-checkbox");
          var label = document.getElementById("task-site-theme-label");
          if (cb) {
            cb.checked = isLight;
          }
          if (label) {
            label.textContent = isLight ? "Light" : "Dark";
          }
        }

        var cb = document.getElementById("task-site-theme-checkbox");
        if (cb) {
          cb.checked = getTheme() === "light";
          cb.addEventListener("change", function () {
            applyTheme(cb.checked ? "light" : "dark");
          });
        }
        var label = document.getElementById("task-site-theme-label");
        if (label) {
          label.textContent = getTheme() === "light" ? "Light" : "Dark";
        }
      })();
    </script>
  </body>
</html>
