name: CI & deploy

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check & tests
        env:
          DJANGO_SETTINGS_MODULE: task.settings.development
        run: |
          python manage.py check
          python manage.py test --verbosity 2

  deploy-render:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL is not configured; skipping Render deploy."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
